    <meta charset="utf-8" />

    <title>Astra Interior | Luxury Interior Designers & Bespoke Furniture Coimbatore</title>
    <meta name="description" content="Elevate your living with Astra Interior, Coimbatore's leading luxury design studio. Specializing in premium residential interiors and bespoke furniture." />

    <meta name="robots" content="index, follow" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="%PUBLIC_URL%/static/css/main.fcaa9797.css" />

    <style>
      :root { --brand-brown: #2C1E14; --brand-gold: #A68A64; }
      html, body {
        overflow-x: hidden; width: 100%; margin: 0; padding: 0;
        background-color: #FAF9F6;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100dvh; }
      
      /* Instant Brand Shell */
      #initial-load-shell {
        position: fixed; top: 0; left: 0; width: 100%; height: 80px;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px; z-index: 100; pointer-events: none;
        transition: opacity 0.5s ease;
      }
      .shell-logo { display: flex; align-items: center; gap: 12px; }
      .shell-dot { width: 40px; height: 40px; background: var(--brand-brown); border-radius: 50%; }
      .shell-text { font-family: 'serif'; font-size: 20px; letter-spacing: 0.2em; color: var(--brand-brown); }
    </style>
  </head>
  <body>
    <div id="initial-load-shell">
      <div class="shell-logo">
        <div class="shell-dot"></div>
        <div style="display: flex; flex-direction: column;">
          <span class="shell-text">ASTRA</span>
          <span style="font-size: 8px; letter-spacing: 0.4em; color: #78716c;">INTERIOR</span>
        </div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', () => {
        const shell = document.getElementById('initial-load-shell');
        if (shell) {
          shell.style.opacity = '0';
          setTimeout(() => shell.remove(), 500);
        }
      });
    </script>
  </body>
